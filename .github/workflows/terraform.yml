name: Deploy to GCP (Terraform)

on:
  push:
    paths:
      - 'envs/dev/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # REQUIRED for OIDC

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Authenticate to GCP (Phase 1)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ☁️ Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 🏗 Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔍 Debug (VERY IMPORTANT for you since no local setup)
      - name: Show changed files
        run: |
          echo "Changed files:"
          git diff --name-only HEAD~1 || true

      # 📦 Deploy (initial version: deploy all folders)
      - name: Terraform Deploy (All Devs)
        run: |
          for dir in $(find envs/dev -maxdepth 1 -mindepth 1 -type d); do
            echo "-----------------------------"
            echo "Deploying $dir"
            echo "-----------------------------"

            cd $dir

            terraform init
            terraform plan
            terraform apply -auto-approve

            cd -
          done
