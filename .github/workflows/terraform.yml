name: GCP Terraform CI/CD

on:
  push:
    branches:
      - main
    paths:
      - 'dev/**'
  pull_request:
    paths:
      - 'dev/**'

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # 📥 Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔍 Detect changed files
      - name: Detect Changes
        id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only HEAD~1)
          else
            files=$(git ls-files)
          fi

          echo "Changed files:"
          echo "$files"

          dirs=$(echo "$files" | grep '^dev/' | awk -F/ 'NF>=2 {print $1"/"$2}' | sort -u | tr '\n' ' ')
          echo "dirs=$dirs" >> $GITHUB_OUTPUT

      # 🔐 Select Service Account (IAM vs Infra)
      - name: Select Service Account
        id: sa
        run: |
          if echo "${{ steps.changes.outputs.dirs }}" | grep -q "dev/devops"; then
            echo "SERVICE_ACCOUNT=${{ secrets.GCP_SERVICE_ACCOUNT_IAM }}" >> $GITHUB_OUTPUT
          else
            echo "SERVICE_ACCOUNT=${{ secrets.GCP_SERVICE_ACCOUNT }}" >> $GITHUB_OUTPUT
          fi

      # 🔐 Authenticate
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ steps.sa.outputs.SERVICE_ACCOUNT }}

      # ☁️ Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 🏗 Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔐 Terraform Format Check
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # 🔐 Terraform Validate
      - name: Terraform Validate
        run: |
          for dir in ${{ steps.changes.outputs.dirs }}; do
            if [ -f "$dir/main.tf" ]; then
              cd $dir
              terraform init -backend=false
              terraform validate
              cd -
            fi
          done

      # 🔍 Security Scan (Checkov)
      - name: Run Checkov (Security Scan)
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: .
          quiet: true
          soft_fail: true   # don't fail pipeline yet (can enforce later)

      # 📦 Terraform Init
      - name: Terraform Init
        run: |
          for dir in ${{ steps.changes.outputs.dirs }}; do
            if [ -f "$dir/main.tf" ]; then
              echo "Initializing $dir"
              cd $dir
              terraform init
              cd -
            fi
          done

      # 📊 Terraform Plan (Visible in PR)
      - name: Terraform Plan
        run: |
          for dir in ${{ steps.changes.outputs.dirs }}; do
            if [ -f "$dir/main.tf" ]; then
              echo "Planning $dir"
              cd $dir
              terraform plan -no-color
              cd -
            fi
          done

      # 🚀 Terraform Apply (ONLY on main)
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: |
          for dir in ${{ steps.changes.outputs.dirs }}; do
            if [ -f "$dir/main.tf" ]; then
              echo "Applying $dir"
              cd $dir
              terraform apply -auto-approve
              cd -
            fi
          done
