name: Deploy to GCP (Terraform)

on:
  push:
    paths:
      - 'dev/**'   # ✅ trigger only when dev folder changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # ✅ required for OIDC

    steps:
      # 📥 Checkout repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 🔐 Authenticate to GCP (OIDC)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      # ☁️ Setup gcloud
      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 🏗 Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔍 Debug: show repo structure (helps troubleshooting)
      - name: Show repo structure
        run: |
          echo "Repo structure:"
          ls -R

      # 🔎 Detect changed folders safely
      - name: Detect changed folders
        id: changes
        run: |
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only HEAD~1)
          else
            files=$(git ls-files)
          fi
      
          echo "Changed files:"
          echo "$files"
      
          # Extract only valid dev/<folder> paths (ignore files like .md)
          dirs=$(echo "$files" | grep '^dev/' | awk -F/ 'NF>=2 {print $1"/"$2}' | sort -u)
      
          echo "Filtered directories:"
          echo "$dirs"
      
          # Convert to space-separated (IMPORTANT for GitHub output)
          dirs_single_line=$(echo "$dirs" | tr '\n' ' ')
      
          echo "dirs=$dirs_single_line" >> $GITHUB_OUTPUT

      # 🚀 Terraform Deploy (only changed folders)
      - name: Terraform Deploy
        run: |
          echo "Detecting Terraform directories under dev/..."
      
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            files=$(git diff --name-only HEAD~1)
          else
            files=$(git ls-files)
          fi
      
          echo "Changed files:"
          echo "$files"
      
          # Find all directories under dev/ that contain main.tf
          dirs=$(find dev -type f -name "main.tf" -exec dirname {} \; | sort -u)
      
          echo "Terraform directories found:"
          echo "$dirs"
      
          for dir in $dirs; do
            echo "-----------------------------"
            echo "Processing $dir"
            echo "-----------------------------"
      
            cd $dir
      
            terraform init
            terraform plan
            terraform apply -auto-approve
      
            cd -
          done
